name: Deploy Documentation to GitHub Pages

on:
  push:
    branches:
      - main
      - documentation-workflow
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip" # cache dependencies

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install your app packages, quartodoc, and anything needed to import your modules
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Ensure quartodoc is explicitly available if not in requirements.txt
          pip install quartodoc

      - name: Build Documentation via Makefile
        run: make build-docs

      - name: Setup GitHub Pages Environment
        uses: actions/configure-pages@v5

      - name: Upload Static Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs/_build'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4