project:
  type: website
  output-dir: _build

website:
  title: "Boreal Birds Documentation"
  sidebar:
    style: "docked"
    search: true
    contents:
      - href: index.qmd
        text: Home
      - href: deployment.qmd
        text: Deployment Instructions
      - href: markdown_contents.qmd
        text: Markdown Contents
      - href: static_assets.qmd
        text: Static Assets
      - section: "Reference"
        contents:
          - reference/index.qmd
          - auto: reference

format:
  html:
    toc: true
    toc-depth: 3

quartodoc:
  dir: reference
  package: app
  
  sections:
    - title: Core Modules
      desc: Main application entry points, helper functions for map, assets, domain-based components, and global configuration.
      contents:
        - app
        - assets.icons
        - assets.images
        - assets.sounds
        - domain.map
        - domain.charts
        - domain.birds

    - title: Data Loading
      desc: Unified data access layer for high-performance Polars pipelines and remote DRAC servers.
      contents:
        - shared.data_loading
        - shared.paths
        
    - title: Server Logic
      desc: Backend server logic and reactive workflow execution routing.
      contents:
        - server.landbird_v5_server
        
    - title: UI Components
      desc: Modular frontend interface elements, page layouts, navigation controls, and view toggle containers.
      contents:
        - ui.components.announcements
        - ui.components.contact
        - ui.components.layout
        - ui.layout.sidebar
        - ui.pages.welcome
        - ui.pages.methods
        - ui.pages.landbirds_v4
        - ui.pages.landbirds_v5
        - ui.pages.model_access

    - title: Utilities
      desc: Other utility modules including the TiTiler API gateways.
      contents:
        - utils.titiler