- section: Study Area
  content: |
    Models were developed based on data from non-arctic portions of Canada.
    Sampling effort varied greatly across the study area.
    In general, northern environmental conditions were underrepresented,
    and southern boreal conditions were overrepresented in comparison with the rest of the study area...

